<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berfin HTML sivu</title>
    <!-- <link rel="stylesheet" href="style.css"> -->
    <!-- Internal CSS -->
    <style>
        li {
            color: darkslategray;
            font-size: 1.1rem;
            margin-bottom: 4px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <!-- Inline CSS -->
    <h1 style="color: steelblue;">Welcome to Berfin Page</h1>
    <p>This is a paragraph.</p>

    <img src="./dog.jpg" alt="Kuvalinkki on rikki">


    <h2>Ordered List</h2>
    <ol>
        <li>First item</li>
        <li>Second item</li>
        <li>Third item</li>
    </ol>

    <h2>Unordered List</h2>
    <ul>
        <li>First item</li>
        <li>Second item</li>
        <li>Third item</li>
    </ul>
    <form>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name"><br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email"><br><br>
        <input type="submit" value="Submit">
    </form>

</body>

</html>
