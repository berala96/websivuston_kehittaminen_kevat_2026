<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berfin HTML sivu</title>
</head>

<body>
    <h1>Welcome to Berfin`s Page</h1>
    <p>Tämä on ensimmäinen työpajatehtäväni.</p>

    <img src="./dog.jpg" alt="Kuvalinkki on rikki">


    <h2>Harrastukseni</h2>
    <ol>
        <li>First item</li>
        <li>Second item</li>
        <li>Third item</li>
    </ol>

    <h2>Unordered List</h2>
    <ul>
        <li>First item</li>

        <input type="submit" value="Submit">
